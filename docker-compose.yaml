services:
    web:
        build:
            context: "."
            dockerfile: "./docker/Dockerfile"
        container_name: "php_nginx"
        ports:
            - "80:80"
        volumes:
            - ".:/var/www/html/"

    # リリース管理用PHPコンテナ
    php-cli:
        build:
            context: "."
            dockerfile: "./docker/Dockerfile"
        container_name: "php_cli"
        volumes:
            - ".:/var/www/html/"
        working_dir: /var/www/html
        entrypoint:
            - "docker-php-entrypoint"
        command:
            - "sleep"
            - "infinity"
        profiles:
            - tools
